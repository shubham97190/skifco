{% extends "base.html" %}

{% block title %}Login — {{ site_config.name }}{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-hover">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div style="width:60px;height:60px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                                <i class="bi bi-person-fill" style="font-size:1.5rem;color:var(--primary);"></i>
                            </div>
                            <h3 class="fw-600">Welcome Back</h3>
                            <p class="text-muted small">Login to your account</p>
                        </div>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-600">Email</label>
                                <input type="email" name="username" class="form-control" required autofocus placeholder="Enter your email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Password</label>
                                <input type="password" name="password" class="form-control" required placeholder="Enter your password">
                            </div>
                            {% if form.errors %}
                            <div class="alert alert-danger rounded-custom py-2 small">Invalid email or password.</div>
                            {% endif %}
                            <button type="submit" class="btn btn-primary-custom w-100 py-2">Login</button>
                        </form>
                        <p class="text-center mt-4 mb-0 small">
                            Don't have an account? <a href="{% url 'accounts:register' %}" class="text-primary-custom fw-600">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
